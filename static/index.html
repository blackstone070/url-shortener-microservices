<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short.ly by Devesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-500 mb-2">Short.ly by Devesh</h1>
        </div>

        <div class="space-y-4">
            <input id="longUrl" type="url" placeholder="Enter long URL (https://...)"
                   class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">

            <button onclick="shorten()" id="shortenBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Shorten Now
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-4 bg-gray-900 rounded-lg border border-blue-900/30 hidden">
            <p class="text-xs text-blue-400 font-semibold uppercase mb-2">Success! Your link:</p>

            <div class="flex items-center justify-between gap-2">
                <a id="shortLink" href="#" target="_blank"
                   class="text-white font-mono break-all underline hover:text-blue-300 flex-1 text-sm"></a>

                <button id="copyBtn" onclick="copyLink()"
                        class="flex-shrink-0 bg-blue-900 hover:bg-blue-800 text-blue-200 border border-blue-700 text-xs font-semibold px-3 py-1.5 rounded-md transition-colors">
                    Copy
                </button>
            </div>

            <!-- NEW: Analytics Panel -->
            <div class="mt-6 pt-4 border-t border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs text-gray-500 uppercase font-bold tracking-widest">Live Stats</span>
                    <span id="clickCount" class="bg-blue-900 text-blue-200 px-3 py-1 rounded-full text-xs font-bold">0 Clicks</span>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700">
                        <p class="text-[10px] text-gray-500 uppercase mb-1">Top Device</p>
                        <p id="topDevice" class="text-xs font-bold text-green-400">---</p>
                    </div>
                    <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700">
                        <p class="text-[10px] text-gray-500 uppercase mb-1">Country</p>
                        <p id="topCountry" class="text-xs font-bold text-blue-400">India</p>
                    </div>
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 uppercase mb-2 font-bold">Clicks by State (India)</p>
                    <ul id="stateList" class="space-y-1 text-xs text-gray-300 max-h-32 overflow-y-auto pr-2">
                        <!-- States injected here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pollInterval = null;
        let currentShortCode = null;

        async function shorten() {
            const urlInput = document.getElementById('longUrl').value.trim();
            if (!urlInput) return alert('Please enter a URL!');

            const btn = document.getElementById('shortenBtn');
            btn.textContent = 'Shortening...';
            btn.disabled = true;

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target_url: urlInput })
                });

                const data = await response.json();
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('shortLink').innerText = data.short_url;
                document.getElementById('shortLink').href = data.short_url;
                
                currentShortCode = data.short_url.split('/').pop();

                if (pollInterval) clearInterval(pollInterval);
                fetchClicks(currentShortCode);
                pollInterval = setInterval(() => fetchClicks(currentShortCode), 3000);

            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.textContent = 'Shorten Now';
                btn.disabled = false;
            }
        }

        async function fetchClicks(code) {
            try {
                const res = await fetch(`/stats/${code}`);
                const data = await res.json();
                
                // Update Total Clicks
                document.getElementById('clickCount').innerText = `${data.total_clicks} Clicks`;

                // Update Devices
                const devices = data.analytics.devices;
                const topDevice = Object.keys(devices).reduce((a, b) => devices[a] > devices[b] ? a : b, "---");
                document.getElementById('topDevice').innerText = topDevice;

                // Update States List
                const stateList = document.getElementById('stateList');
                stateList.innerHTML = "";
                const states = data.analytics.states;
                
                // Sort states by click count
                Object.entries(states)
                    .sort(([,a], [,b]) => b - a)
                    .forEach(([state, count]) => {
                        stateList.innerHTML += `
                            <li class="flex justify-between py-1 border-b border-gray-800 last:border-0">
                                <span>📍 ${state}</span>
                                <span class="font-bold text-blue-400">${count}</span>
                            </li>`;
                    });

            } catch (_) {}
        }

        function copyLink() {
            const link = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                btn.classList.replace('bg-blue-900', 'bg-green-900');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.replace('bg-green-900', 'bg-blue-900');
                }, 2000);
            });
        }
    </script>
</body>
</html>
