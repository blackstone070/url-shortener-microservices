services:
  # --- 1. C++ Encoder Service ---
  encoder:
    image: my-cp:latest
    build:
      context: .
      dockerfile: Dockerfile.encoder
    # No ports needed to be exposed to your PC, only internally to Python
    expose:
      - "18080"

  # --- 2. Redis Speed Layer ---
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- 3. PostgreSQL Persistence ---
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- 4. Python Web API (The Manager) ---
  web:
    image: my-python-web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_HOST=${REDIS_HOST}
      - ENCODER_URL=${ENCODER_URL}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
      encoder:
        condition: service_started

volumes:
  postgres_data:
